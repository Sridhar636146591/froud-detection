<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Face Verification - Fraud Detection</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-primary">
        <div class="container">
            <a class="navbar-brand" href="/">
                <i class="bi bi-shield-check me-2"></i>
                <strong>Fraud Detection</strong>
            </a>
        </div>
    </nav>

    <div class="container mt-4">
        <h2><i class="bi bi-person-bounding-box me-2"></i>Face Verification</h2>
        <p class="text-muted">Feature 4: Deepfake & Face Spoof Detection</p>

        <div class="row">
            <div class="col-md-6">
                <div class="card">
                    <div class="card-header">
                        <h5>Upload Photo</h5>
                    </div>
                    <div class="card-body">
                        <form method="POST" enctype="multipart/form-data">
                            <div class="mb-3">
                                <label class="form-label">Photo Type</label>
                                <select class="form-select">
                                    <option>Live Capture</option>
                                    <option>ID Photo</option>
                                    <option>Selfie</option>
                                </select>
                            </div>
                            <div class="mb-3">
                                <label class="form-label">Upload Photo</label>
                                <input type="file" class="form-control" accept=".jpg,.jpeg,.png">
                            </div>
                            <div class="alert alert-info">
                                <i class="bi bi-camera me-2"></i>
                                Or use live camera capture
                            </div>
                            <button type="submit" class="btn btn-primary">
                                <i class="bi bi-shield-check me-2"></i>Verify Identity
                            </button>
                        </form>
                    </div>
                </div>
            </div>
            <div class="col-md-6">
                <div class="card">
                    <div class="card-header bg-warning text-dark">
                        <h5><i class="bi bi-exclamation-triangle me-2"></i>Detection Capabilities</h5>
                    </div>
                    <div class="card-body">
                        <ul class="list-group list-group-flush">
                            <li class="list-group-item">
                                <i class="bi bi-check-circle text-success me-2"></i>
                                Liveness Detection
                            </li>
                            <li class="list-group-item">
                                <i class="bi bi-check-circle text-success me-2"></i>
                                Deepfake Detection
                            </li>
                            <li class="list-group-item">
                                <i class="bi bi-check-circle text-success me-2"></i>
                                Screen Replay Attack Detection
                            </li>
                            <li class="list-group-item">
                                <i class="bi bi-check-circle text-success me-2"></i>
                                2D Mask Detection
                            </li>
                            <li class="list-group-item">
                                <i class="bi bi-check-circle text-success me-2"></i>
                                Lighting Consistency Check
                            </li>
                        </ul>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
